spring.application.name=quiropracticoAPI
spring.profiles.active=dev

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=86400000

twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}

# Configuración Cloudflare R2 (Object Storage)
r2.endpoint=${R2_ENDPOINT}
r2.access-key=${R2_ACCESS_KEY}
r2.secret-key=${R2_SECRET_KEY}
r2.bucket-name=${R2_BUCKET_NAME}

# Límites de subida para documentos médicos (Radiografías/PDFs)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
